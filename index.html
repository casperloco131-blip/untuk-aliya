<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teruntuk Aliya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;600&display=swap');

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%); /* Warna hangat */
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        /* Layar Pembuka (Pancingan Audio iPhone/Android) */
        #pintu-masuk {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.5s ease;
        }

        #pintu-masuk h2 { font-family: 'Dancing Script', cursive; color: #f8b500; font-size: 2rem; }
        #pintu-masuk button {
            margin-top: 20px; padding: 15px 40px; border: none;
            background: #f8b500; color: white; border-radius: 30px;
            font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Kartu Konten */
        .wrapper {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            margin: 50px 0;
            position: relative; z-index: 10;
        }

        .foto-frame {
            width: 150px; height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .foto-frame img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Dancing Script', cursive; color: #b48a00; font-size: 2.2rem; margin: 10px 0; }

        #pesan-box {
            text-align: left;
            font-size: 1.05rem;
            line-height: 1.8;
            color: #444;
            white-space: pre-line; /* Menjaga spasi dan baris baru */
            padding: 10px;
        }

        /* Hati Melayang */
        .heart {
            position: fixed; top: -10%;
            font-size: 20px; color: rgba(255, 255, 255, 0.8);
            user-select: none; z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) translateX(50px) rotate(360deg); opacity: 0; }
        }

        .btn-wa {
            display: inline-block; margin-top: 30px;
            padding: 12px 25px; background: #25d366;
            color: white; text-decoration: none; border-radius: 20px;
            font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(37,211,102,0.3);
        }
    </style>
</head>
<body>

    <div id="pintu-masuk">
        <h2>Minal Aidin Wal Faizin, Aliya..</h2>
        <button onclick="buka()">Buka Dari Casper ❤️</button>
    </div>

    <div class="wrapper">
        <div class="foto-frame">
            <img src="aliya.jpeg" alt="Aliya">
        </div>
        <h1>Minal Aidin Wal Faizin</h1>
        <div id="pesan-box"></div>
        
        <a href="https://wa.me/NOMOR_WA_KAMU?text=Aku%20sudah%20baca%20pesannya..." class="btn-wa">Balas di WhatsApp</a>
    </div>

    <audio id="lagu" loop>
        <source src="avenged.mp3" type="audio/mpeg">
    </audio>

    <script>
        function buka() {
            document.getElementById('pintu-masuk').style.opacity = '0';
            setTimeout(() => { document.getElementById('pintu-masuk').style.display = 'none'; }, 1500);
            
            const musik = document.getElementById('lagu');
            musik.play();
            mulaiKetik();
            hujanHati();
        }

        function mulaiKetik() {
            const pesan = `Assalamu'alaikum Aliya...

Minal Aidin Wal Faizin, mohon maaf lahir dan batin ya. Di hari yang suci ini, aku ingin menyampaikan sesuatu yang mungkin selama ini tertahan.

Pertama, aku ingin minta maaf secara tulus... Maaf jika aku terlalu sering membuatmu terluka untuk sekian kalinya. Maaf atas segala sikapku yang egois, kata-kataku yang mungkin tajam, dan tindakanku yang mengecewakanmu.

Aku juga minta maaf yang sebesar-besarnya karena sudah membuatmu menunggu dalam waktu yang sangat, sangat lama. Aku tahu waktu adalah hal yang tidak bisa diputar kembali, dan aku menyesal telah menyia-nyiakan kesabaranmu selama ini.

Aku sadar, kata maaf mungkin terdengar murah dibandingkan rasa sakit yang kamu rasakan. Namun, ketahuilah bahwa penyesalan ini nyata. Terima kasih sudah menjadi orang yang paling sabar menghadapi semua kekuranganku. Kamu adalah bagian terindah dalam ceritaku, dan aku benci fakta bahwa akulah yang menggoreskan luka itu.

Semoga lebaran kali ini membawa kebahagiaan untukmu, dan semoga pintu maafmu masih terbuka sedikit saja untukku. Aku tidak berharap semuanya kembali instan, aku hanya ingin kamu tahu kalau aku benar-benar menyesal.

Sekali lagi, mohon maaf ya, Aliya.`;

            let i = 0;
            const target = document.getElementById('pesan-box');
            
            function mengetik() {
                if (i < pesan.length) {
                    target.innerHTML += pesan.charAt(i);
                    i++;
                    // Auto-scroll ke bawah supaya teks yang baru muncul terlihat
                    window.scrollTo(0, document.body.scrollHeight);
                    setTimeout(mengetik, 50);
                }
            }
            mengetik();
        }

        function hujanHati() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
